server:
  port: 8081

spring:
  application:
    name: course

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5433/${COURSE_DB}
    username: ${COURSE_USER}
    password: ${COURSE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration